<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Azure cost management hero image">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#031b34"/>
      <stop offset="48%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="20%" r="36%">
      <stop offset="0%" stop-color="#7dd3fc" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#7dd3fc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,.04)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <rect width="1200" height="720" fill="url(#glow)"/>

  <g transform="translate(72 74)">
    <rect width="592" height="572" rx="36" fill="rgba(3,27,52,.34)" stroke="rgba(255,255,255,.14)"/>
    <rect x="34" y="34" width="320" height="50" rx="25" fill="rgba(255,255,255,.1)"/>
    <text x="60" y="66" fill="#dbeafe" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">Azure • FinOps Guide</text>
    <text x="34" y="150" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5">COST OPTIMIZATION</text>
    <text x="34" y="244" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800">Azure Cost</text>
    <text x="34" y="318" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="62" font-weight="800">Management</text>
    <text x="34" y="392" fill="rgba(255,255,255,.82)" font-family="Inter, Arial, sans-serif" font-size="25">Reduce waste with tagging, right-sizing, reserved capacity,</text>
    <text x="34" y="426" fill="rgba(255,255,255,.82)" font-family="Inter, Arial, sans-serif" font-size="25">autoscaling, lifecycle policies, and a practical FinOps loop.</text>

    <g transform="translate(34 466)">
      <rect width="154" height="78" rx="20" fill="url(#card)" stroke="rgba(125,211,252,.22)"/>
      <text x="24" y="32" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">SAVINGS</text>
      <text x="24" y="62" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">72%</text>
      <text x="76" y="62" fill="rgba(255,255,255,.72)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Reserved</text>
    </g>
    <g transform="translate(206 466)">
      <rect width="154" height="78" rx="20" fill="url(#card)" stroke="rgba(125,211,252,.22)"/>
      <text x="24" y="32" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">SPOT</text>
      <text x="24" y="62" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">90%</text>
      <text x="76" y="62" fill="rgba(255,255,255,.72)" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600">Reduction</text>
    </g>
    <g transform="translate(378 466)">
      <rect width="180" height="78" rx="20" fill="url(#card)" stroke="rgba(125,211,252,.22)"/>
      <text x="24" y="32" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">FRAMEWORK</text>
      <text x="24" y="62" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">9 steps</text>
    </g>
  </g>

  <g transform="translate(776 120)">
    <rect x="0" y="0" width="320" height="480" rx="34" fill="rgba(255,255,255,.07)" stroke="rgba(125,211,252,.22)"/>
    <rect x="28" y="30" width="264" height="56" rx="18" fill="rgba(255,255,255,.08)"/>
    <text x="54" y="64" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Monthly Azure Bill</text>

    <g transform="translate(34 118)">
      <text x="0" y="0" fill="#7dd3fc" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">TOP COST DRIVERS</text>
      <rect x="0" y="28" width="232" height="18" rx="9" fill="rgba(255,255,255,.08)"/>
      <rect x="0" y="28" width="142" height="18" rx="9" fill="#38bdf8"/>
      <text x="0" y="70" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Compute</text>
      <text x="210" y="70" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">50%</text>

      <rect x="0" y="98" width="232" height="18" rx="9" fill="rgba(255,255,255,.08)"/>
      <rect x="0" y="98" width="74" height="18" rx="9" fill="#f59e0b"/>
      <text x="0" y="140" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Storage</text>
      <text x="210" y="140" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">20%</text>

      <rect x="0" y="168" width="232" height="18" rx="9" fill="rgba(255,255,255,.08)"/>
      <rect x="0" y="168" width="58" height="18" rx="9" fill="#22d3ee"/>
      <text x="0" y="210" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Network</text>
      <text x="210" y="210" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="800">15%</text>
    </g>

    <g transform="translate(34 378)">
      <rect width="252" height="70" rx="18" fill="rgba(2,132,199,.18)" stroke="rgba(125,211,252,.22)"/>
      <text x="20" y="28" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">ACTION LOOP</text>
      <text x="20" y="53" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Observe → Optimize → Govern</text>
    </g>
  </g>
</svg>
