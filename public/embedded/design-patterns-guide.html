    const { useState, useEffect, useRef } = React;
    const ALLOWED_THEMES = new Set(["light", "dark"]);
    const getStoredTheme = () => {
      try {
        return localStorage.getItem("abhishekpanda-theme");
      } catch {
        return null;
      }
    };
    const resolveTheme = (candidate) => {
      if (ALLOWED_THEMES.has(candidate)) return candidate;
      const stored = getStoredTheme();
      if (ALLOWED_THEMES.has(stored)) return stored;
      return window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
    };
    const applyEmbeddedTheme = (candidate) => {
      const theme = resolveTheme(candidate);
      document.documentElement.setAttribute("data-theme", theme);
      document.documentElement.style.colorScheme = theme;
      if (document.body) {
        document.body.style.background = theme === "light" ? "#f8fafc" : "#0a0a0f";
      }
    };
    applyEmbeddedTheme(new URLSearchParams(window.location.search).get("theme"));
    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;
      if (event.data?.type === "parent-theme") applyEmbeddedTheme(event.data.theme);
    });
    window.addEventListener("storage", (event) => {
      if (event.key === "abhishekpanda-theme") applyEmbeddedTheme(event.newValue);
    });
    try {
      const channel = new BroadcastChannel("abhishekpanda-theme");
      channel.addEventListener("message", (event) => {
        if (event.data?.type === "theme-change") applyEmbeddedTheme(event.data.theme);
      });
    } catch {}

public interface ILogger {
    void Log(string jsonMessage);
}

// Adaptee (legacy/third-party — can't modify)
public class LegacyXmlLogger {
    public void LogXml(string xmlData) 
        => Console.WriteLine($"XML LOG: {xmlData}");
}

// Adapter — bridges the gap
public class XmlLoggerAdapter : ILogger {
    private readonly LegacyXmlLogger _adaptee;
    
    public XmlLoggerAdapter(LegacyXmlLogger adaptee) 
        => _adaptee = adaptee;
    
    public void Log(string jsonMessage) {
        // Convert JSON → XML then delegate
        var xml = ConvertJsonToXml(jsonMessage);
        _adaptee.LogXml(xml);
    }
    
    private string ConvertJsonToXml(string json) 
        => $"<log>{json}</log>"; // Real impl uses XmlSerializer

// Caching Proxy
public class CachingProductProxy : IProductService {
    private readonly IProductService _real;
    private readonly Dictionary<int, (Product p, DateTime exp)> _cache = new();
    private readonly TimeSpan _ttl = TimeSpan.FromMinutes(5);
    
    public CachingProductProxy(IProductService real) => _real = real;
    
    public Product GetProduct(int id) {
        if (_cache.TryGetValue(id, out var cached) 
            && DateTime.UtcNow < cached.exp) {
            Console.WriteLine($"⚡ Cache HIT for product {id}");
            return cached.p; // Return from cache
        }
        var product = _real.GetProduct(id); // Only on cache miss
        _cache[id] = (product, DateTime.UtcNow.Add(_ttl));
        return product;
    }
}

// Let's see a custom implementation to understand the pattern

public interface IIterator<T> {
    T Current { get; }
    bool HasNext();
    void Next();
    void Reset();
}

// A custom tree iterator (in-order traversal)
public class BinaryTree<T> where T : IComparable<T> {
    private class Node { public T Value; public Node? Left, Right; }
    private Node? _root;
    
    public void Insert(T value) { /* BST insertion */ }
    
    // Returns an in-order iterator
    public IIterator<T> GetInOrderIterator() 
        => new InOrderIterator<T>(_root);
}

// Concrete iterator — client doesn't know about Node structure!
public class InOrderIterator<T> : IIterator<T> {
    private Stack<dynamic> _stack = new();
    public T Current { get; private set; }
    
    public InOrderIterator(dynamic root) => PushLeft(root);
    
    public bool HasNext() => _stack.Count > 0;
    public void Next() {
        var node = _stack.Pop();
        Current = node.Value;
        PushLeft(node.Right);
    }
    public void Reset() => _stack.Clear();
    private void PushLeft(dynamic node) {
        while(node != null) { _stack.Push(node); node = node.Left; }
    }
}

// C# idiomatic version using yield return ✅
public IEnumerable<T> InOrder() {
    IEnumerable<T> Traverse(Node? n) {
        if (n == null) yield break;
        foreach (var v in Traverse(n.Left)) yield return v;
        yield return n.Value;
        foreach (var v in Traverse(n.Right)) yield return v;
    }
    return Traverse(_root);
}`,

// ─── FLOW DIAGRAM COMPONENT ────────────────────────────────────────────────
function FlowDiagram({ pattern, color }) {
  const { flow, arrows } = pattern;
  if (!flow) return null;
  const nodeMap = {};
  flow.forEach(n => { nodeMap[n.id] = n; });
  const [tick, setTick] = useState(0);
  useEffect(() => {
    const t = setInterval(() => setTick(x => x+1), 1800);
    return () => clearInterval(t);
  }, []);
  const activeArrow = tick % arrows.length;

  return (
    <div style={{ position:"relative", height:"160px", background:"rgba(0,0,0,0.3)", borderRadius:"12px", border:`1px solid ${color}33`, overflow:"hidden", marginTop:"12px" }}>
      <svg style={{position:"absolute",top:0,left:0,width:"100%",height:"100%"}}>
        <defs>
          <marker id={`arrow-${pattern.id}`} markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
            <path d="M0,0 L0,6 L8,3 z" fill={color} />
          </marker>
        </defs>
        {arrows.map(([from, to], i) => {
          const f = nodeMap[from], t2 = nodeMap[to];
          if (!f || !t2) return null;
          const x1 = f.x + 7, y1 = f.y, x2 = t2.x - 3, y2 = t2.y;
          const isActive = i === activeArrow;
          return (
            <g key={i}>
              <line x1={`${x1}%`} y1={`${y1}%`} x2={`${x2}%`} y2={`${y2}%`}
                stroke={isActive ? color : `${color}44`}
                strokeWidth={isActive ? 2 : 1}
                strokeDasharray={isActive ? "6 3" : "none"}
                style={isActive ? {animation:"flowRight 0.8s linear infinite"} : {}}
                markerEnd={`url(#arrow-${pattern.id})`}
              />
              {isActive && (
                <circle r="4" fill={color} opacity="0.9" style={{filter:`drop-shadow(0 0 6px ${color})`}}>
                  <animateMotion dur="1.2s" repeatCount="indefinite"
                    path={`M ${x1}% ${y1}% L ${x2}% ${y2}%`} />
                </circle>
              )}
            </g>
          );
        })}
      </svg>
      {flow.map(node => (
        <div key={node.id} style={{
          position:"absolute", left:`${node.x}%`, top:`${node.y}%`,
          transform:"translate(-50%,-50%)",
          background: node.special ? color : "rgba(20,20,40,0.9)",
          border: `1px solid ${node.special ? color : `${color}55`}`,
          color: node.special ? "#000" : "#fff",
          padding:"4px 8px", borderRadius:"8px",
          fontSize:"9px", fontWeight:"700", fontFamily:"JetBrains Mono,monospace",
          textAlign:"center", whiteSpace:"pre-line", lineHeight:"1.2",
          boxShadow: node.special ? `0 0 12px ${color}88` : "none",
          minWidth:"55px", zIndex:2,
          animation: node.special ? "glow 2s ease-in-out infinite" : "none",
          "--glow": color,
        }}>
          {node.label}
        </div>
      ))}
    </div>
  );
}

function CodeBlock({ code, color }) {
  const [copied, setCopied] = useState(false);
  const kw = ["public","private","protected","abstract","sealed","override","virtual","class","interface","new","return","var","string","int","decimal","bool","List","Dictionary","void","static","readonly","get","set","null","true","false","this","base","foreach","if","else","while","using","namespace","async","await","throw","try","catch"];
  const highlighted = code.split('\n').map((line, li) => {
    const parts = line.split(/\b/);
    return (
      <div key={li} style={{lineHeight:"1.7"}}>
        {parts.map((p, i) => (
          <span key={i} style={{
            color: kw.includes(p) ? color :
                   p.match(/^".*"$/) || p.match(/^'.*'$/) ? "#86efac" :
                   p.match(/^\d+$/) ? "#fbbf24" :
                   p.match(/^\/\//) ? "#6b7280" :
                   p.match(/^[A-Z][a-zA-Z]+$/) ? "#93c5fd" : "#e2e8f0"
          }}>{p}</span>
        ))}
      </div>
    );
  });
  return (
    <div style={{position:"relative"}}>
      <div style={{
        background:"#0d1117", border:`1px solid ${color}33`, borderRadius:"10px",
        padding:"16px 16px 16px 16px", fontFamily:"JetBrains Mono,monospace",
        fontSize:"11px", lineHeight:"1.6", overflowX:"auto",
        maxHeight:"380px", overflowY:"auto",
        boxShadow:`inset 0 0 30px rgba(0,0,0,0.5)`,
      }}>
        <div style={{color:"#6b7280",marginBottom:"8px",fontSize:"10px",borderBottom:`1px solid ${color}22`,paddingBottom:"6px"}}>
          <span style={{color:color}}>●</span> C# · .NET
        </div>
        <div style={{counterReset:"line"}}>
          {highlighted}
        </div>
      </div>
      <button onClick={() => { navigator.clipboard?.writeText(code); setCopied(true); setTimeout(()=>setCopied(false),2000); }}
        style={{position:"absolute",top:"8px",right:"8px",background:copied?`${color}33`:"rgba(255,255,255,0.05)",
          border:`1px solid ${color}44`,color:copied?color:"#666",padding:"4px 10px",
          borderRadius:"6px",cursor:"pointer",fontSize:"10px",fontFamily:"JetBrains Mono,monospace"}}>
        {copied?"✅ Copied":"Copy"}
      </button>
    </div>
  );
}

              </div>

              🔷 .NET & C# — Patterns You Already Use
            </h3>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:"10px"}}>
              {[
                {f:"C# Events / Delegates",p:"Observer",c:"#a855f7",d:"button.Click += handler is Observer. The button notifies all registered handlers."},
                {f:"IEnumerable / foreach",p:"Iterator",c:"#06b6d4",d:"Every foreach loop uses the Iterator pattern via IEnumerable / IEnumerator."},
                {f:"ASP.NET Core Middleware",p:"Chain of Responsibility",c:"#f59e0b",d:"app.Use(...) chains middleware. Each handles or passes to next."},
                {f:"LINQ",p:"Iterator + Strategy",c:"#34d399",d:"LINQ chains lazy iterators. OrderBy() is Strategy — swap sort algorithm."},
                {f:"Entity Framework Lazy Loading",p:"Proxy",c:"#f472b6",d:"EF wraps entities in proxy objects that intercept property access."},
                {f:"StringBuilder",p:"Builder",c:"#fb923c",d:"Fluent API: sb.Append().AppendLine().Insert() — building complex string step by step."},
              ].map(item=>(
                <div key={item.f} style={{background:"rgba(0,0,0,0.3)",borderRadius:"10px",padding:"14px",border:`1px solid ${item.c}22`}}>
                  <div style={{background:`${item.c}18`,color:item.c,display:"inline-block",
                    padding:"2px 10px",borderRadius:"20px",fontSize:"10px",
                    fontFamily:"JetBrains Mono,monospace",fontWeight:"700",marginBottom:"8px"}}>{item.p}</div>
                  <div style={{color:"#fff",fontFamily:"Inter,sans-serif",fontWeight:"600",fontSize:"12px",marginBottom:"5px"}}>{item.f}</div>
                  <div style={{color:"#9ca3af",fontFamily:"Inter,sans-serif",fontSize:"11px",lineHeight:"1.5"}}>{item.d}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function App() {
  const [selectedId, setSelectedId] = useState("intro");
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [viewportWidth, setViewportWidth] = useState(window.innerWidth);
  const [scrollPct, setScrollPct] = useState(0);
  const contentRef = useRef(null);
  const selectedPattern = ALL_PATTERNS.find(p => p.id === selectedId);
  const showRightSidebar = viewportWidth >= 1200;

  useEffect(() => {
    const onResize = () => setViewportWidth(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  useEffect(() => {
    const node = contentRef.current;
    if (!node) return;

    const updateProgress = () => {
      const maxScroll = node.scrollHeight - node.clientHeight;
      const pct = maxScroll <= 0 ? 0 : (node.scrollTop / maxScroll) * 100;
      setScrollPct(Math.max(0, Math.min(100, pct)));
    };

    updateProgress();
    node.addEventListener("scroll", updateProgress);
    return () => node.removeEventListener("scroll", updateProgress);
  }, []);

  useEffect(() => {
    const node = contentRef.current;
    if (!node) return;
    node.scrollTo({ top: 0, behavior: "smooth" });
    setScrollPct(0);
  }, [selectedId]);

  const topBarLabel = selectedPattern
    ? `${selectedPattern.emoji} ${selectedPattern.name}`
    : selectedId === "intro" ? "🎨 Introduction"
    : selectedId === "blog"  ? "🚀 Add to Blog"
    : "🎯 GoF Design Patterns · All 23";

  const showBack = selectedId !== null && selectedId !== "intro";

  return (
    <>
      <style>{INJECTED_STYLES}</style>
      <div style={{display:"flex",height:"100vh",background:"#0a0a0f",overflow:"hidden",fontFamily:"Inter,sans-serif"}}>
        {sidebarOpen && (
          <Sidebar selectedId={selectedId} onSelect={id => setSelectedId(id)} />
        )}
        <div ref={contentRef} style={{flex:1,overflowY:"auto",background:"#0a0a0f",minWidth:0}}>
          {/* Top bar */}
          <div style={{position:"sticky",top:0,zIndex:10,background:"rgba(10,10,15,0.95)",
            backdropFilter:"blur(10px)",borderBottom:"1px solid rgba(255,255,255,0.06)",
            padding:"10px 16px",display:"flex",alignItems:"center",gap:"12px"}}>
            <button onClick={() => setSidebarOpen(o=>!o)} style={{
              background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
              color:"#9ca3af",padding:"6px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"14px"}}>
              ☰
            </button>
            {showBack && (
              <button onClick={() => setSelectedId(null)} style={{
                background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",
                color:"#9ca3af",padding:"6px 10px",borderRadius:"6px",cursor:"pointer",fontSize:"12px",fontFamily:"Inter,sans-serif"}}>
                ← All Patterns
              </button>
            )}
            <span style={{color:"#374151",fontSize:"12px",fontFamily:"JetBrains Mono,monospace"}}>
              {topBarLabel}
            </span>
            <div style={{marginLeft:"auto",display:"flex",gap:"6px"}}>
              {["creational","structural","behavioral"].map(cat => (
                <span key={cat} style={{
                  background:`${CAT_COLORS[cat].primary}15`,
                  color:CAT_COLORS[cat].primary,
                  border:`1px solid ${CAT_COLORS[cat].primary}33`,
                  padding:"3px 8px",borderRadius:"20px",fontSize:"10px",fontFamily:"Inter,sans-serif",fontWeight:"600"
                }}>
                  {cat==="creational"?"5":cat==="structural"?"7":"11"} {cat.slice(0,3)}
                </span>
              ))}
            </div>
          </div>

          {/* Content router */}
          <div style={{padding:"20px",maxWidth:showRightSidebar?"980px":"960px",margin:"0 auto"}}>
            {selectedId === "intro"    ? <IntroPage /> :
             selectedId === "blog"     ? <BlogGuidePage /> :
             selectedPattern           ? <PatternDetail pattern={selectedPattern} /> :
                                         <Home onSelect={setSelectedId} />}
          </div>
        </div>
        {showRightSidebar && (
          <RightSidebar
            selectedId={selectedId}
            selectedPattern={selectedPattern}
            scrollPct={scrollPct}
            onSelect={setSelectedId}
            onScrollTop={() => contentRef.current?.scrollTo({ top: 0, behavior: "smooth" })}
          />
        )}
      </div>
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
